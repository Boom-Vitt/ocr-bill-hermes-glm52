<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCR Bill Manager — จัดการบิลด้วย OCR</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --accent: #4f9eff;
      --accent2: #38bdf8;
      --text: #e4e7ee;
      --muted: #8892a6;
      --border: #2a2e3a;
      --danger: #ef4444;
      --success: #22c55e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    header {
      text-align: center;
      padding: 30px 20px 20px;
    }
    header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }

    .container { max-width: 900px; margin: 0 auto; }

    .upload-zone {
      background: var(--card);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .upload-zone:hover { border-color: var(--accent); background: #1e2230; }
    .upload-zone.dragover { border-color: var(--accent2); background: #1e2230; }
    .upload-zone .icon { font-size: 3rem; }
    .upload-zone p { color: var(--muted); margin-top: 12px; }
    .upload-zone input { display: none; }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity .2s;
    }
    button:hover { opacity: .85; }
    button:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
    button.secondary { background: var(--card); border: 1px solid var(--border); }

    .preview {
      display: flex;
      gap: 24px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    .preview > div { flex: 1; min-width: 280px; }
    .preview h3 { margin-bottom: 12px; color: var(--muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
    .preview img {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .result-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .result-box.empty { color: var(--muted); text-align: center; font-family: inherit; display: flex; align-items: center; justify-content: center; }

    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 4px;
      margin-top: 16px;
      overflow: hidden;
      display: none;
    }
    .progress-bar.active { display: block; }
    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width .3s;
    }

    .bills-section { margin-top: 40px; }
    .bills-section h2 { font-size: 1.3rem; margin-bottom: 16px; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
    }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: #232733; color: var(--muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: .5px; }
    td { font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    .empty-row td { text-align: center; color: var(--muted); padding: 30px; }
    .total-row td { font-weight: bold; color: var(--accent2); font-size: 1rem; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--success);
      color: #fff;
      padding: 14px 24px;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      opacity: 0;
      transform: translateY(20px);
      transition: all .3s;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: var(--danger); }

    .actions-row { display: flex; gap: 8px; }
    .actions-row button { padding: 6px 14px; font-size: 0.8rem; }

    @media (max-width: 600px) {
      header h1 { font-size: 1.4rem; }
      .upload-zone { padding: 24px; }
      .preview { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>OCR Bill Manager</h1>
      <p>อัปโหลดรูปบิล/ใบเสร็จ → OCR อ่านตัวอักษร → จัดการบิลทั้งหมดในที่เดียว</p>
    </header>

    <!-- Upload -->
    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon"> Receipt 📸</div>
      <p>คลิกหรือลากรูปบิลมาวางที่นี่ (PNG / JPG)</p>
      <input type="file" id="fileInput" accept="image/*" />
    </div>

    <!-- Progress -->
    <div class="progress-bar" id="progressBar">
      <div class="fill" id="progressFill"></div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="ocrBtn" disabled onclick="runOCR()">🔍 เริ่ม OCR</button>
      <button class="secondary" onclick="downloadJSON()">⬇️ Export JSON</button>
      <button class="secondary" onclick="downloadCSV()">⬇️ Export CSV</button>
      <button class="secondary" onclick="clearBills()">🗑️ ล้างทั้งหมด</button>
    </div>

    <!-- Preview -->
    <div class="preview">
      <div>
        <h3>รูปบิล</h3>
        <img id="previewImg" style="display:none;" />
      </div>
      <div>
        <h3>ผล OCR</h3>
        <div class="result-box empty" id="resultBox">ผล OCR จะแสดงที่นี่...</div>
      </div>
    </div>

    <!-- Bills Table -->
    <div class="bills-section">
      <h2>📋 รายการบิลทั้งหมด</h2>
      <table id="billsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>วันที่</th>
            <th>ผู้ออกบิล</th>
            <th>จำนวนเงิน (บาท)</th>
            <th>เพิ่มเติม</th>
            <th>จัดการ</th>
          </tr>
        </thead>
        <tbody id="billsBody">
          <tr class="empty-row"><td colspan="6">ยังไม่มีบิล — อัปโหลดรูปแล้วกด OCR เพื่อเริ่ม</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Tesseract.js -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    let currentImage = null;
    let bills = JSON.parse(localStorage.getItem('ocr_bills') || '[]');

    const dropZone   = document.getElementById('dropZone');
    const fileInput  = document.getElementById('fileInput');
    const previewImg = document.getElementById('previewImg');
    const resultBox  = document.getElementById('resultBox');
    const ocrBtn     = document.getElementById('ocrBtn');
    const progressBar= document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');

    // ── File handling ──
    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) loadImage(e.target.files[0]);
    });
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
    });

    function loadImage(file) {
      currentImage = file;
      const url = URL.createObjectURL(file);
      previewImg.src = url;
      previewImg.style.display = 'block';
      ocrBtn.disabled = false;
      resultBox.textContent = '';
      resultBox.classList.add('empty');
      resultBox.textContent = 'พร้อม OCR — กดปุ่ม "เริ่ม OCR"';
    }

    // ── OCR ──
    async function runOCR() {
      if (!currentImage) return;
      ocrBtn.disabled = true;
      ocrBtn.textContent = '⏳ กำลังอ่าน...';
      progressBar.classList.add('active');
      progressFill.style.width = '0%';
      resultBox.classList.remove('empty');
      resultBox.textContent = 'กำลังประมวลผล OCR...';

      try {
        const { data } = await Tesseract.recognize(currentImage, 'tha+eng', {
          logger: m => {
            if (m.status === 'recognizing text') {
              const pct = Math.round(m.progress * 100);
              progressFill.style.width = pct + '%';
              resultBox.textContent = `กำลังอ่านตัวอักษร... ${pct}%`;
            }
          }
        });

        const rawText = data.text.trim();
        resultBox.textContent = rawText || '(ไม่พบตัวอักษร)';

        // Parse bill info
        const bill = parseBill(rawText);
        if (bill) {
          bills.push(bill);
          localStorage.setItem('ocr_bills', JSON.stringify(bills));
          renderBills();
          showToast('บันทึกบิลเรียบร้อย ✅');
        } else {
          showToast('อ่านได้แต่ไม่สามารถ parse ข้อมูลบิล', true);
        }
      } catch (err) {
        resultBox.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
        showToast('OCR ล้มเหลว ❌', true);
      } finally {
        ocrBtn.disabled = false;
        ocrBtn.textContent = '🔍 เริ่ม OCR';
        progressBar.classList.remove('active');
      }
    }

    // ── Parse bill from OCR text ──
    function parseBill(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      const fullText = text.replace(/\n/g, ' ');

      // หาจำนวนเงิน (รองรับ 1,234.56 / 1234.56 / 1,234-)
      const amountPatterns = [
        /(?:ยอดรวม|รวมทั้งสิ้น|total|grand\s*total|สุทธิ|ยอด\s*สุทธิ|amount)[:\s]*([\d,]+\.\d{2})/i,
        /([\d,]+\.\d{2})\s*(?:บาท|baht|thb)/i,
        /(?:ยอดรวม|รวม|total|สุทธิ)\s*([\d,]+\.\d{2})/i,
      ];
      let amount = null;
      for (const p of amountPatterns) {
        const m = fullText.match(p);
        if (m) { amount = parseFloat(m[1].replace(/,/g, '')); break; }
      }
      // fallback: หาเลขที่มีทศนิยม 2 ตำแหน่งที่ใหญ่ที่สุด
      if (amount === null) {
        const nums = fullText.match(/[\d,]+\.\d{2}/g);
        if (nums) {
          amount = Math.max(...nums.map(n => parseFloat(n.replace(/,/g, ''))));
        }
      }

      // หาวันที่ (dd/mm/yyyy, dd-mm-yyyy, dd.mm.yyyy)
      const dateMatch = fullText.match(/(\d{1,2})[/.-](\d{1,2})[/.-](\d{2,4})/);
      const date = dateMatch ? dateMatch[0] : '-';

      // หาผู้ออกบิล (บรรทัดแรกที่ไม่ใช่ตัวเลข)
      let vendor = '-';
      for (const line of lines.slice(0, 8)) {
        if (!/^\d/.test(line) && line.length > 2 && !/receipt|tax/i.test(line)) {
          vendor = line.substring(0, 40);
          break;
        }
      }

      if (amount !== null) {
        return { date, vendor, amount, extra: fullText.substring(0, 80), raw: text };
      }
      return null;
    }

    // ── Render bills table ──
    function renderBills() {
      const body = document.getElementById('billsBody');
      if (bills.length === 0) {
        body.innerHTML = '<tr class="empty-row"><td colspan="6">ยังไม่มีบิล — อัปโหลดรูปแล้วกด OCR เพื่อเริ่ม</td></tr>';
        return;
      }
      let html = '';
      bills.forEach((b, i) => {
        html += `<tr>
          <td>${i + 1}</td>
          <td>${b.date}</td>
          <td>${b.vendor}</td>
          <td style="text-align:right">${b.amount.toLocaleString('th-TH', {minimumFractionDigits:2})}</td>
          <td style="color:var(--muted);font-size:.8rem">${b.extra}</td>
          <td class="actions-row">
            <button class="secondary" onclick="viewBill(${i})">ดู</button>
            <button class="secondary" onclick="deleteBill(${i})" style="color:var(--danger)">✕</button>
          </td>
        </tr>`;
      });
      const total = bills.reduce((s, b) => s + b.amount, 0);
      html += `<tr class="total-row"><td colspan="3">ยอดรวมทั้งหมด</td><td style="text-align:right">${total.toLocaleString('th-TH', {minimumFractionDigits:2})}</td><td colspan="2"></td></tr>`;
      body.innerHTML = html;
    }

    function viewBill(i) {
      resultBox.classList.remove('empty');
      resultBox.textContent = bills[i].raw || bills[i].extra;
    }

    function deleteBill(i) {
      bills.splice(i, 1);
      localStorage.setItem('ocr_bills', JSON.stringify(bills));
      renderBills();
      showToast('ลบบิลแล้ว');
    }

    function clearBills() {
      if (bills.length === 0) return;
      if (!confirm('ล้างบิลทั้งหมด?')) return;
      bills = [];
      localStorage.setItem('ocr_bills', JSON.stringify(bills));
      renderBills();
      showToast('ล้างบิลทั้งหมดแล้ว');
    }

    // ── Export ──
    function downloadJSON() {
      if (bills.length === 0) return showToast('ไม่มีบิลให้ export', true);
      const blob = new Blob([JSON.stringify(bills, null, 2)], { type: 'application/json' });
      triggerDownload(blob, 'bills.json');
    }

    function downloadCSV() {
      if (bills.length === 0) return showToast('ไม่มีบิลให้ export', true);
      let csv = 'No,Date,Vendor,Amount,Extra\n';
      bills.forEach((b, i) => {
        csv += `${i+1},"${b.date}","${b.vendor}",${b.amount},"${b.extra.replace(/"/g,'""')}"\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      triggerDownload(blob, 'bills.csv');
    }

    function triggerDownload(blob, filename) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // ── Toast ──
    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // init
    renderBills();
  </script>
</body>
</html>
